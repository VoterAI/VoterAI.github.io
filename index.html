<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoterAI - منصة الإنتاج السينمائي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --primary: #66fcf1;
            --secondary: #45a29e;
            --text-color: #c5c6c7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 800px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid rgba(102, 252, 241, 0.2);
        }

        h1 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 25px;
            font-size: 2rem;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.4);
        }

        h1 i { margin-left: 10px; }

        .section {
            background: rgba(11, 12, 16, 0.5);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .section-title {
            color: var(--secondary);
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #111;
            color: #fff;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            box-sizing: border-box;
            resize: vertical;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        textarea:focus { border-color: var(--primary); }

        .upload-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .upload-btn {
            background: #111;
            border: 1px dashed var(--secondary);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-btn:hover {
            border-color: var(--primary);
            background: rgba(102, 252, 241, 0.05);
        }

        .upload-btn i {
            font-size: 1.5rem;
            color: var(--secondary);
            margin-bottom: 10px;
        }

        .upload-btn span { display: block; font-size: 0.9rem; }

        input[type="file"] { display: none; }

        .generate-btn {
            width: 100%;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--primary);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fa-solid fa-film"></i> VoterAI Cinema Studio</h1>

    <div class="section">
        <div class="section-title"><i class="fa-solid fa-scroll"></i> السيناريو والحوار للفيلم (40 دقيقة+)</div>
        <textarea placeholder="اكتب القصة هنا... مثلاً: لقطة الغروب، السيارة متعطلة بسبب نفاد البنزين، والجدال مع الصديق..."></textarea>
    </div>

    <div class="section">
        <div class="section-title"><i class="fa-solid fa-folder-open"></i> رفع الأصول والمواد الخام</div>
        <div class="upload-grid">
            <label class="upload-btn">
                <input type="file" accept="image/*">
                <i class="fa-solid fa-building"></i>
                <span>صورة المصنع</span>
            </label>
            <label class="upload-btn">
                <input type="file" accept="image/*">
                <i class="fa-solid fa-robot"></i>
                <span>صورة هاجي واجي</span>
            </label>
            <label class="upload-btn">
                <input type="file" accept="audio/*">
                <i class="fa-solid fa-volume-high"></i>
                <span>المؤثرات الصوتية</span>
            </label>
        </div>
    </div>

    <button class="generate-btn">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        توليد الفيلم السينمائي الكامل
    </button>
    <div id="video-result-container" style="display: none; margin-top: 25px; border-radius: 12px; overflow: hidden; box-shadow: 0 0 25px var(--primary); border: 2px solid var(--primary);">
        <video id="final-video-player" controls style="width: 100%; border-radius: 10px;">
            <source src="" type="video/mp4">
            متصفحك لا يدعم تشغيل الفيديو.
        </video>
        <div style="background: rgba(0,0,0,0.8); padding: 15px; color: #fff;">
            <h4 style="margin-top: 0; color: var(--secondary);">📝 السيناريو السينمائي الكامل (الـ 40 دقيقة):</h4>
            <pre id="ai-generated-script" style="white-space: pre-wrap; font-size: 0.9rem; max-height: 200px; overflow-y: auto; color: #ddd;">
                سيتم تحميل السيناريو هنا...
            </pre>
        </div>
    </div>

    <div class="footer">
        مدعوم بواسطة مفتاح Gemini API | تم التطوير بواسطة Tayap
    </div>
</div>
<script>
    // ⚠️ ضع رابط الـ ngrok الخاص بك هنا بدلاً من الرابط التجريبي بالأسفل
    const SERVER_URL = "https://unvizored-clementina-reformedly.ngrok-free.dev"; 

    const generateBtn = document.querySelector('.generate-btn');
    const textarea = document.querySelector('textarea');
    
    generateBtn.addEventListener('click', async () => {
        const scriptText = textarea.value;
        
        if (!scriptText) {
            alert("⚠️ يرجى كتابة السيناريو أولاً قبل التوليد!");
            return;
        }

        generateBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري التوليد والتحليل السينمائي...';
        generateBtn.disabled = true;

        const formData = new FormData();
        formData.append("script", scriptText);

        try {
            const response = await fetch(`${SERVER_URL}/generate-movie/`, {
                method: "POST",
                body: formData
            });

            const data = await response.json();

           if (data.status === "success") {
                // 🎉 نجاح! لا داعي للتنبيه، سنعرض الفيديو فوراً
                console.log("السيناريو المولد:", data.ai_script);

                // 1. نظهر صندوق الفيديو المخفي
                const videoContainer = document.getElementById('video-result-container');
                const videoPlayer = document.getElementById('final-video-player');
                const scriptPre = document.getElementById('ai-generated-script');

                videoContainer.style.display = 'block';
                
                // 2. نحدث رابط الفيديو (نستخدم رابط السيرفر الكامل)
                videoPlayer.querySelector('source').src = `${SERVER_URL}${data.video_url}`;
                videoPlayer.load(); // تحميل ملف الفيديو الجديد
                
                // 3. نضع السيناريو الذي ألفه Gemini
                scriptPre.textContent = data.ai_script;

                // 4. ننزل لأسفل الصفحة ليرى المستخدم الفيديو
                videoContainer.scrollIntoView({ behavior: 'smooth' });

            } else {
                console.log("السيناريو المولد:", data.ai_script);
                // هنا يمكننا مستقبلاً عرض الفيديو مباشرة في الموقع!
            } else {
                alert("❌ حدث خطأ أثناء التوليد: " + data.message);
            }
        } catch (error) {
            alert("❌ فشل الاتصال بالسيرفر! تأكد أن الكولاب يعمل والرابط صحيح.");
            console.error(error);
        } finally {
            generateBtn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> توليد الفيلم السينمائي الكامل';
            generateBtn.disabled = false;
        }
    });
</script>
    
</body>
</html>
